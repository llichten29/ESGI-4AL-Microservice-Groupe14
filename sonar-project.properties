sonar.projectKey=ESGI-4AL-Microservice-Groupe14
sonar.projectName=ESGI-4AL-Microservice-Groupe14
sonar.projectVersion=1.0

sonar.host.url=http://localhost:9000

sonar.language=py
sonar.python.version=3.10
sonar.sourceEncoding=UTF-8

sonar.sources=services/main/

sonar.tests=services/tests

sonar.test.inclusions=**/test_*.py

sonar.exclusions=.venv/**,**/__pycache__/**,.idea/**,**/*.pyc

sonar.python.coverage.reportPaths=coverage.xml

# Hotspots revus et assumes pour ce PoC (justifications ci-dessous)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# CSRF non applicable : API JSON stateless, authentification Bearer JWT, aucune session ni cookie
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S4502
sonar.issue.ignore.multicriteria.e1.resourceKey=**/app.py

# HTTP assume : trafic interne au reseau Docker isole du PoC, TLS termine au point d'entree en cible
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py

# COPY cibles (main/shared, ressources/endpoints, main/<service>) et .dockerignore effectif dans services/
sonar.issue.ignore.multicriteria.e3.ruleKey=docker:S6470
sonar.issue.ignore.multicriteria.e3.resourceKey=**/Dockerfile

# USER appuser defini avant CMD ; root necessaire uniquement pour pip install au build
sonar.issue.ignore.multicriteria.e4.ruleKey=docker:S6471
sonar.issue.ignore.multicriteria.e4.resourceKey=**/Dockerfile

openapi: 3.0.3
info:
  title: Service Paiement — API interne
  description: >
    Façade transactionnelle vers le PSP externe (Stripe simulé) : autorisation,
    capture et remboursement. API **interne** : non exposée par l'API Gateway,
    consommée uniquement par le service Commande (orchestrateur SAGA).
    Toutes les opérations d'écriture sont idempotentes (Idempotency-Key).
  version: 1.0.0
  contact:
    name: Groupe 14 — ESGI 4AL
servers:
  - url: http://paiement-service:8004/v1
    description: Réseau interne Docker
tags:
  - name: Paiements
paths:
  /paiements:
    post:
      tags: [Paiements]
      summary: Autoriser un paiement (étape 2 de la SAGA)
      description: >
        Demande une autorisation au PSP : les fonds sont réservés mais non débités.
        La capture interviendra à la livraison.
      operationId: autoriserPaiement
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutorisationDemande' }
            example:
              orderId: "c3d4e5f6-a7b8-4c9d-8e1f-2a3b4c5d6e7f"
              clientId: "0a1b2c3d-4e5f-4a6b-8c7d-8e9f0a1b2c3d"
              montant: 27.49
              devise: EUR
              moyenPaiementId: "pm_4242"
      responses:
        '201':
          description: Autorisation acceptée par le PSP.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Paiement' }
        '400': { $ref: '#/components/responses/ErreurValidation' }
        '402':
          description: Paiement refusé par le PSP (fonds insuffisants, carte invalide…).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erreur' }
        '409':
          description: Clé d'idempotence déjà utilisée avec un contenu différent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erreur' }
        '504':
          description: PSP injoignable (timeout) — l'appelant applique sa politique de retry/circuit breaker.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erreur' }
  /paiements/{paiementId}:
    get:
      tags: [Paiements]
      summary: Consulter un paiement
      operationId: consulterPaiement
      parameters:
        - $ref: '#/components/parameters/PaiementId'
      responses:
        '200':
          description: Détail du paiement.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Paiement' }
        '404': { $ref: '#/components/responses/IntrouvableRep' }
  /paiements/{paiementId}/capture:
    post:
      tags: [Paiements]
      summary: Capturer un paiement autorisé (fin de SAGA, commande livrée)
      operationId: capturerPaiement
      parameters:
        - $ref: '#/components/parameters/PaiementId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Fonds débités.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Paiement' }
        '404': { $ref: '#/components/responses/IntrouvableRep' }
        '422':
          description: Capture impossible (paiement non autorisé, déjà capturé ou remboursé).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erreur' }
  /paiements/{paiementId}/remboursement:
    post:
      tags: [Paiements]
      summary: Rembourser (compensation de la SAGA) — total ou partiel
      operationId: rembourserPaiement
      parameters:
        - $ref: '#/components/parameters/PaiementId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                montant:
                  type: number
                  format: decimal
                  description: Montant à rembourser ; absent = remboursement total.
                motif:
                  type: string
                  example: "restaurant_refus"
      responses:
        '200':
          description: Remboursement (ou annulation d'autorisation) effectué.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Paiement' }
        '404': { $ref: '#/components/responses/IntrouvableRep' }
        '422':
          description: Remboursement impossible (montant supérieur au capturé…).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erreur' }
components:
  parameters:
    PaiementId:
      in: path
      name: paiementId
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, format: uuid }
      description: Garantit qu'un retry ne rejoue jamais l'opération deux fois.
  responses:
    ErreurValidation:
      description: Requête invalide.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Erreur' }
    IntrouvableRep:
      description: Paiement introuvable.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Erreur' }
  schemas:
    StatutPaiement:
      type: string
      enum: [AUTORISE, CAPTURE, REMBOURSE_PARTIEL, REMBOURSE, REFUSE]
    Paiement:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        statut: { $ref: '#/components/schemas/StatutPaiement' }
        montant: { type: number, format: decimal, example: 27.49 }
        montantRembourse: { type: number, format: decimal, example: 0 }
        devise: { type: string, example: EUR }
        referencePsp:
          type: string
          description: Identifiant de la transaction chez le PSP (aucune donnée de carte stockée).
          example: "pi_3PqK8x2eZvKYlo2C"
        creeLe: { type: string, format: date-time }
        misAJourLe: { type: string, format: date-time }
    AutorisationDemande:
      type: object
      required: [orderId, clientId, montant, devise, moyenPaiementId]
      properties:
        orderId: { type: string, format: uuid }
        clientId: { type: string, format: uuid }
        montant: { type: number, format: decimal, minimum: 0.01 }
        devise: { type: string, enum: [EUR] }
        moyenPaiementId:
          type: string
          description: Référence tokenisée côté PSP.
    Erreur:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: "PAIEMENT_REFUSE" }
        message: { type: string, example: "Fonds insuffisants." }
        details: { type: object, additionalProperties: true }
